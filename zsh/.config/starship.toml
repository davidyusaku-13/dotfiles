[character]
success_symbol = "[ÔØ»](#cba6f7)"
error_symbol = "[ÔØ»](#f38ba8)"
vimcmd_symbol = "[ÔØ«](#89b4fa)"

[os]
disabled = false
style = "bg:#f5e0dc fg:#181825"
format = "[ $symbol]($style)"

[os.symbols]
Windows = "¯ÿƒ"
Macos = "¯£æ"
Arch = "´à╝"

[username]
show_always = true
style_user = "bg:#f5e0dc fg:#181825"
format = "[ $user]($style)"

[directory]
style = "bg:#cba6f7 fg:#181825"
format = "[ $path]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[git_branch]
symbol = "´Éÿ "
style = "bg:#89b4fa fg:#181825"
format = '[ $symbol$branch]($style)'
truncation_length = 15

[git_status]
style = "bg:#89b4fa fg:#181825"
format = '[$all_status$ahead_behind]($style)'
conflicted = "´ü▒ "
up_to_date = ""
untracked = "´üÖ "
ahead = "Ôçí${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
behind = "Ôçú${count}"
stashed = "´âç "
modified = "´üä "
staged = "´üå "
renamed = "´üÜ "
deleted = "´Çì "

[nodejs]
symbol = "¯£ÿ"
style = "bg:#a6e3a1 fg:#181825"
