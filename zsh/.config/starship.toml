format = """\
[](#f5e0dc)\
$os\
$username\
[](bg:#cba6f7 fg:#181825)\
$directory\
[](fg:#cba6f7 bg:#89b4fa)\
$git_branch\
$git_status\
[](fg:#89b4fa bg:#a6e3a1)\
$nodejs\
$python\
$rust\
$golang\
[](fg:#a6e3a1 bg:#f9e2af)\
